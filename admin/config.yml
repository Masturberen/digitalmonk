backend:
  name: github
  repo: JOUW-GITHUB-USERNAME/digitalmonk
  branch: main

media_folder: "static/images"
public_folder: "/static/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["thoughts"]
      - { label: "Samenvatting", name: "excerpt", widget: "text" }
      - { label: "Inhoud", name: "body", widget: "markdown" }
      - label: "Gepubliceerd"
        name: "published"
        widget: "boolean"
        default: true
